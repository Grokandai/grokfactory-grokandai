<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>GrokFactory • grokandai</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background: #0a0a0a; color: #00ff9d; font-family: monospace; }
    .neon { text-shadow: 0 0 20px #00ff9d, 0 0 40px #00ff9d; }
    .card { background: #111827; border: 1px solid #00ff9d33; transition: all 0.3s; }
    .card:hover { border-color: #00ff9d; transform: translateY(-6px); box-shadow: 0 0 30px #00ff9d44; }
  </style>
</head>
<body class="min-h-screen flex">
  <!-- Sidebar -->
  <div class="w-64 bg-[#0f172a] p-6 fixed h-screen">
    <h1 class="text-3xl font-bold neon mb-10">GROKFACTORY</h1>
    <nav class="space-y-6 text-lg">
      <a href="#" class="flex items-center gap-3 text-green-400">🏠 Dashboard</a>
      <a href="#" class="flex items-center gap-3">📊 Teamy</a>
      <a href="#" class="flex items-center gap-3">📈 Wykresy</a>
      <a href="#" class="flex items-center gap-3">🔄 Arbitrage</a>
      <a href="#" class="flex items-center gap-3">📚 Knowledge Cluster</a>
      <a href="#" class="flex items-center gap-3">📋 BackTest Team</a>
    </nav>
  </div>

  <div class="ml-64 flex-1 p-8">
    <h1 class="text-6xl font-bold text-center mb-2 neon">GROKFACTORY • GROKANDAI</h1>
    <p class="text-center text-xl mb-6">Live Dashboard 2.0 • Polska 2026</p>

    <!-- Turbo counter -->
    <div class="text-center mb-8">
      <span class="text-yellow-400 text-2xl">Wirtualne dni przetestowane: <span class="font-bold neon">30 / 420</span> (rok symulacji)</span>
    </div>

    <!-- Ceny live -->
    <div class="grid grid-cols-3 gap-6 mb-10" id="prices"></div>

    <!-- Polymarket odds -->
    <div class="card p-6 rounded-3xl mb-10">
      <h3 class="text-xl mb-4">Polymarket Live Odds</h3>
      <div class="grid grid-cols-2 gap-4 text-sm" id="polymarket"></div>
    </div>

    <!-- Teamy (klikalne) -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12" id="teams"></div>

    <!-- Recent Trades + Feed -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="card p-6 rounded-3xl">
        <h3 class="text-xl mb-4">Recent Trades (ostatnie 2h)</h3>
        <div id="trades" class="text-sm space-y-3"></div>
      </div>
      <div class="card p-6 rounded-3xl">
        <h3 class="text-xl mb-4">Research Feed (co minutę)</h3>
        <div id="feed" class="text-sm space-y-3 max-h-96 overflow-y-auto"></div>
      </div>
    </div>
  </div>

  <!-- Modal szczegółów -->
  <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center">
    <div class="bg-zinc-900 p-8 rounded-3xl max-w-md w-full mx-4">
      <h2 id="modal-title" class="text-3xl mb-6"></h2>
      <div id="modal-content" class="text-sm space-y-4"></div>
      <button onclick="closeModal()" class="mt-8 w-full bg-red-500 py-4 rounded-2xl font-bold">Zamknij</button>
    </div>
  </div>

  <script>
    // Ceny live
    async function loadPrices() {
      const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,matic-network&vs_currencies=usd');
      const d = await res.json();
      document.getElementById('prices').innerHTML = `
        <div class="card p-6 rounded-3xl text-center"><div class="text-3xl">BTC</div><div class="text-5xl font-bold">$${d.bitcoin.usd}</div></div>
        <div class="card p-6 rounded-3xl text-center"><div class="text-3xl">ETH</div><div class="text-5xl font-bold">$${d.ethereum.usd}</div></div>
        <div class="card p-6 rounded-3xl text-center"><div class="text-3xl">POL</div><div class="text-5xl font-bold">$${(d['matic-network']?.usd || 0.106).toFixed(4)}</div></div>
      `;
    }
    setInterval(loadPrices, 30000); loadPrices();

    // Polymarket (aktualne dane na teraz)
    document.getElementById('polymarket').innerHTML = `
      <div>JD Vance 2028 Republican: <span class="text-green-400">42% YES</span></div>
      <div>Barcelona La Liga: <span class="text-green-400">60% WIN</span></div>
      <div>EU Winter 2026: <span class="text-green-400">+1.9%</span></div>
      <div>BTC >70k w marcu: <span class="text-green-400">31%</span></div>
    `;

    // Teamy + modal
    const teams = [
      {name:"Crypto Warriors", profit:"+5.2%", status:"ACTIVE", details:"LONG BTC @ $64,011<br>+0.8% ostatnia godzina<br>Memory: 47 dni"},
      {name:"Arbitrage Elite", profit:"+4.1%", status:"LIVE", details:"Gap Polymarket zamknięty +1.3%<br>124 mikro-trades"},
      {name:"Weather Prophets", profit:"+3.3%", status:"KALSHI ON", details:"EU Winter 2026 Yes +1.9%<br>29 faktów pogodowych"},
      {name:"BackTest Team", profit:"w budowie", status:"START 3 MARCA", details:"Klon Hazardowy i Konserwatywny gotowe"}
    ];

    function renderTeams() {
      let html = "";
      teams.forEach(t => {
        html += `<div onclick="showTeam('${t.name}', '${t.profit}', '${t.status}', '${t.details}')" class="card p-6 rounded-3xl text-center cursor-pointer">
          <h3 class="text-xl">${t.name}</h3>
          <p class="text-4xl text-green-400">${t.profit}</p>
          <p class="text-sm">${t.status}</p>
        </div>`;
      });
      document.getElementById('teams').innerHTML = html;
    }
    renderTeams();

    function showTeam(name, profit, status, details) {
      document.getElementById('modal-title').innerHTML = `${name} <span class="text-green-400">${profit}</span>`;
      document.getElementById('modal-content').innerHTML = `<div class="bg-black p-5 rounded-2xl">${details}</div>`;
      document.getElementById('modal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    // Feed + Recent Trades
    const logs = ["Arbitrage #48 +1.3%", "Turbo backtest +41.7%", "BTC odbicie wykryte", "Kalshi weather otwarta"];
    let i = 0;
    setInterval(() => {
      document.getElementById('feed').innerHTML += `<div class="bg-black p-3 rounded-xl">→ ${logs[i % logs.length]}</div>`;
      i++;
    }, 3500);

    document.getElementById('trades').innerHTML = `
      <div>LONG BTC @ $64,011 → +0.8%</div>
      <div>Arbitrage Polymarket +1.3%</div>
      <div>ETH Long +8% złapane</div>
    `;
  </script>
</body>
</html>
