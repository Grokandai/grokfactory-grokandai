<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrokFactory • grokandai</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root {
      --neon: #00ff9d;
      --neon-dim: #00ff9d33;
      --neon-mid: #00ff9d66;
      --bg: #0a0a0a;
      --card-bg: #111827;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--neon);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
    }

    .neon {
      text-shadow: 0 0 20px var(--neon);
    }

    .neon-soft {
      text-shadow: 0 0 10px var(--neon-mid);
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--neon-dim) 1px, transparent 1px),
        linear-gradient(90deg, var(--neon-dim) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .agent-card {
      background: var(--card-bg);
      border: 1px solid var(--neon-dim);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .agent-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--neon-dim) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .agent-card:hover {
      border-color: var(--neon);
      transform: translateY(-6px);
      box-shadow: 0 0 30px var(--neon-dim), 0 20px 40px rgba(0,0,0,0.5);
    }

    .agent-card:hover::before {
      opacity: 1;
    }

    .team-card {
      background: var(--card-bg);
      border: 1px solid var(--neon-dim);
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .team-card:hover {
      border-color: var(--neon);
      transform: translateY(-4px);
      box-shadow: 0 0 25px var(--neon-dim);
    }

    .team-card .team-icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 0.75rem;
    }

    /* Sidebar */
    #sidebar {
      width: 260px;
      background: #0f172a;
      border-right: 1px solid var(--neon-dim);
      position: fixed;
      height: 100vh;
      left: 0;
      top: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      transition: transform 0.3s;
    }

    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      border: 1px solid transparent;
      transition: all 0.2s;
      cursor: pointer;
      margin-bottom: 0.5rem;
    }

    .sidebar-link:hover, .sidebar-link.active {
      background: #1e2937;
      border-color: var(--neon-dim);
    }

    /* Modal */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      overflow-y: auto;
      padding: 2rem 1rem;
    }

    #modal.open {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .modal-inner {
      background: #0f172a;
      border: 1px solid var(--neon-mid);
      border-radius: 1.5rem;
      padding: 2.5rem;
      width: 100%;
      max-width: 1100px;
      position: relative;
      box-shadow: 0 0 60px var(--neon-dim);
    }

    .close-btn {
      background: transparent;
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      font-family: inherit;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.1em;
    }

    .close-btn:hover {
      background: #ef4444;
      color: white;
      box-shadow: 0 0 20px rgba(239,68,68,0.4);
    }

    .details-btn {
      background: transparent;
      border: 1px solid var(--neon);
      color: var(--neon);
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
      width: 100%;
      margin-top: 1.5rem;
    }

    .details-btn:hover {
      background: var(--neon);
      color: #0a0a0a;
      box-shadow: 0 0 20px var(--neon-mid);
    }

    /* Profit badge */
    .profit-badge {
      font-size: 2.5rem;
      font-weight: bold;
      color: #4ade80;
      text-shadow: 0 0 15px rgba(74,222,128,0.5);
      line-height: 1;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: var(--neon-mid); border-radius: 3px; }

    /* Mobile toggle */
    #mobile-menu-btn {
      display: none;
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 200;
      background: #0f172a;
      border: 1px solid var(--neon-dim);
      color: var(--neon);
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      font-size: 1.25rem;
      cursor: pointer;
    }

    /* Pulse dot */
    .pulse-dot {
      width: 8px;
      height: 8px;
      background: var(--neon);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
      margin-right: 6px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--neon); }
      50% { opacity: 0.4; box-shadow: none; }
    }

    /* Fade-in animation */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      animation: fadeInUp 0.4s ease forwards;
    }

    .fade-in-delay-1 { animation-delay: 0.05s; opacity: 0; }
    .fade-in-delay-2 { animation-delay: 0.1s; opacity: 0; }
    .fade-in-delay-3 { animation-delay: 0.15s; opacity: 0; }
    .fade-in-delay-4 { animation-delay: 0.2s; opacity: 0; }
    .fade-in-delay-5 { animation-delay: 0.25s; opacity: 0; }
    .fade-in-delay-6 { animation-delay: 0.3s; opacity: 0; }

    @media (max-width: 768px) {
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #main { margin-left: 0 !important; padding: 1rem; padding-top: 4rem; }
      #mobile-menu-btn { display: block; }
    }
  </style>
</head>
<body>

  <!-- Mobile menu button -->
  <button id="mobile-menu-btn" onclick="toggleSidebar()">☰</button>

  <!-- Sidebar -->
  <div id="sidebar">
    <div style="position: relative; z-index: 1;">
      <h1 class="text-2xl font-bold neon mb-2 tracking-widest">GROKFACTORY</h1>
      <p style="color: var(--neon-mid); font-size: 0.7rem; letter-spacing: 0.15em; margin-bottom: 2rem;">AI AGENT PLATFORM</p>

      <div style="border-top: 1px solid var(--neon-dim); margin-bottom: 1.5rem; padding-top: 1.5rem;">
        <p style="font-size: 0.65rem; letter-spacing: 0.15em; color: var(--neon-mid); margin-bottom: 0.75rem;">NAWIGACJA</p>

        <div class="sidebar-link active" onclick="showTeams()">
          <span>📊</span>
          <span>Teamy</span>
          <span style="margin-left: auto; font-size: 0.75rem; color: var(--neon-mid);">60+</span>
        </div>
        <div class="sidebar-link" onclick="alert('Wkrótce!')">
          <span>📈</span>
          <span>Dashboard</span>
        </div>
        <div class="sidebar-link" onclick="alert('Wkrótce!')">
          <span>⚙️</span>
          <span>Ustawienia</span>
        </div>
      </div>

      <div style="margin-top: auto; border-top: 1px solid var(--neon-dim); padding-top: 1.5rem; margin-top: 2rem;">
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <span class="pulse-dot"></span>
          <span style="font-size: 0.75rem; color: var(--neon-mid);">Wszystkie systemy online</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div id="main" style="margin-left: 260px; flex: 1; padding: 2.5rem; position: relative; z-index: 1;"></div>

  <!-- Modal -->
  <div id="modal">
    <div class="modal-inner">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
        <h2 id="modal-title" class="text-3xl neon"></h2>
        <button class="close-btn" onclick="closeModal()">✕ ZAMKNIJ</button>
      </div>
      <div id="modal-agents" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
  </div>

  <script>
    const TEAMS = [
      { name: 'Crypto Warriors',    icon: '₿',  desc: 'Handel kryptowalutami 24/7' },
      { name: 'Arbitrage Elite',    icon: '⚖️', desc: 'Arbitraż między giełdami'  },
      { name: 'Weather Prophets',   icon: '🌩️', desc: 'Predykcje pogodowe'         },
      { name: 'Politics Pulse',     icon: '🗳️', desc: 'Analiza rynków politycznych'},
      { name: 'Sports Bet Masters', icon: '🏆', desc: 'Typy sportowe AI'           },
      { name: 'Memecoin Hunters',   icon: '🚀', desc: 'Polowanie na memcoiny'      },
    ];

    function showTeams() {
      // Update active state
      document.querySelectorAll('.sidebar-link').forEach((el, i) => {
        el.classList.toggle('active', i === 0);
      });

      const cards = TEAMS.map((t, i) => `
        <div class="team-card p-8 rounded-2xl text-center fade-in fade-in-delay-${i + 1}"
             onclick="openTeam('${t.name}')">
          <span class="team-icon">${t.icon}</span>
          <h3 class="text-xl font-bold neon-soft mb-2">${t.name}</h3>
          <p style="color: var(--neon-mid); font-size: 0.8rem;">${t.desc}</p>
          <p style="color: var(--neon-mid); font-size: 0.7rem; margin-top: 1rem; letter-spacing: 0.1em;">10 AGENTÓW ▶</p>
        </div>
      `).join('');

      document.getElementById('main').innerHTML = `
        <div class="fade-in" style="margin-bottom: 3rem;">
          <h1 class="text-4xl font-bold neon" style="letter-spacing: 0.05em;">TEAMY</h1>
          <p style="color: var(--neon-mid); margin-top: 0.5rem; font-size: 0.85rem; letter-spacing: 0.1em;">60+ AKTYWNYCH AGENTÓW AI</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">${cards}</div>
      `;
    }

    function openTeam(teamName) {
      const agents = Array.from({ length: 10 }, (_, i) => ({
        name: `Agent-${String(i + 1).padStart(2, '0')}`,
        profit: `+${(4.5 + i * 0.7).toFixed(1)}%`,
        trades: Math.floor(80 + Math.random() * 120),
        winrate: `${(65 + i * 2).toFixed(0)}%`,
      }));

      const agentCards = agents.map((a, i) => `
        <div class="agent-card p-6 rounded-2xl flex flex-col fade-in fade-in-delay-${Math.min(i + 1, 6)}"
             style="position: relative; z-index: 1;">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
            <h3 class="text-lg font-bold neon-soft">${a.name}</h3>
            <span style="font-size: 0.65rem; color: var(--neon-mid); background: var(--neon-dim); padding: 0.2rem 0.5rem; border-radius: 0.25rem;">AKTYWNY</span>
          </div>

          <div class="profit-badge" style="margin-bottom: 1rem;">${a.profit}</div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; font-size: 0.75rem; color: var(--neon-mid);">
            <div>
              <div style="font-size: 0.65rem; letter-spacing: 0.1em; margin-bottom: 0.2rem;">TRANSAKCJE</div>
              <div style="color: var(--neon);">${a.trades}</div>
            </div>
            <div>
              <div style="font-size: 0.65rem; letter-spacing: 0.1em; margin-bottom: 0.2rem;">WIN RATE</div>
              <div style="color: var(--neon);">${a.winrate}</div>
            </div>
          </div>

          <button class="details-btn"
                  onclick="alert('Szczegóły agenta ${a.name} – transakcje i wykresy wkrótce!')">
            SZCZEGÓŁY + TRANSAKCJE
          </button>
        </div>
      `).join('');

      document.getElementById('modal-title').textContent = teamName;
      document.getElementById('modal-agents').innerHTML = agentCards;
      document.getElementById('modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    // Close modal on backdrop click
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // Close sidebar on outside click (mobile)
    document.addEventListener('click', function(e) {
      const sidebar = document.getElementById('sidebar');
      const btn = document.getElementById('mobile-menu-btn');
      if (window.innerWidth <= 768 && sidebar.classList.contains('open')
          && !sidebar.contains(e.target) && e.target !== btn) {
        sidebar.classList.remove('open');
      }
    });

    // Init
    showTeams();
  </script>
</body>
</html>
