<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>GrokFactory • grokandai</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background: #0a0a0a; color: #00ff9d; font-family: monospace; }
    .neon { text-shadow: 0 0 20px #00ff9d; }
    .card { background: #111827; border: 1px solid #00ff9d33; transition: all 0.3s; }
    .card:hover { border-color: #00ff9d; transform: translateY(-4px); }
    .sidebar a { transition: all 0.3s; }
    .sidebar a.active { background: #1e2937; border-left: 4px solid #00ff9d; color: white; }
  </style>
</head>
<body class="min-h-screen flex">
  <!-- Sidebar -->
  <div class="w-64 bg-[#0f172a] p-6 fixed h-screen">
    <h1 class="text-3xl font-bold neon mb-10">GROKFACTORY</h1>
    <nav class="space-y-2 text-lg">
      <a href="#" onclick="switchTab(0)" class="active flex items-center gap-3 px-4 py-3 rounded-xl">🏠 Dashboard</a>
      <a href="#" onclick="switchTab(1)" class="flex items-center gap-3 px-4 py-3 rounded-xl">📊 Teamy</a>
      <a href="#" onclick="switchTab(2)" class="flex items-center gap-3 px-4 py-3 rounded-xl">📈 Wykresy</a>
      <a href="#" onclick="switchTab(3)" class="flex items-center gap-3 px-4 py-3 rounded-xl">🔄 Arbitrage</a>
      <a href="#" onclick="switchTab(4)" class="flex items-center gap-3 px-4 py-3 rounded-xl">📚 Knowledge Cluster</a>
      <a href="#" onclick="switchTab(5)" class="flex items-center gap-3 px-4 py-3 rounded-xl">📋 BackTest Team</a>
    </nav>
  </div>

  <div class="ml-64 flex-1 p-8" id="main-content"></div>

  <!-- Modal szczegółów teamu / agenta -->
  <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center">
    <div class="bg-zinc-900 p-8 rounded-3xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
      <h2 id="modal-title" class="text-4xl neon mb-6"></h2>
      <div id="modal-content"></div>
      <button onclick="closeModal()" class="mt-8 w-full bg-red-500 py-4 rounded-2xl font-bold">Zamknij</button>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
      document.querySelectorAll('.sidebar a')[tab].classList.add('active');

      const content = document.getElementById('main-content');

      if (tab === 0) {
        content.innerHTML = `<h1 class="text-6xl font-bold neon mb-8">Dashboard</h1><p class="text-xl">Wybierz team z menu po lewej aby zobaczyć szczegóły agentów</p>`;
      }
      if (tab === 1) {
        content.innerHTML = `
          <h1 class="text-6xl font-bold neon mb-8">Teamy</h1>
          <div class="grid grid-cols-2 gap-6" id="team-list"></div>
        `;
        renderTeamList();
      }
    }

    const teamData = {
      "Crypto Warriors": { agents: [
        {name: "Agent-1", profit: "+8.4%", loss: "-1.2%", effectiveness: "87%", positions: "14"},
        {name: "Agent-2", profit: "+4.1%", loss: "-0.9%", effectiveness: "79%", positions: "9"}
      ]},
      "Arbitrage Elite": { agents: [
        {name: "Agent-1", profit: "+6.7%", loss: "0%", effectiveness: "94%", positions: "47"}
      ]},
      "Weather Prophets": { agents: [
        {name: "Agent-3", profit: "+3.9%", loss: "-2.1%", effectiveness: "68%", positions: "11"}
      ]},
      "BackTest Team": { agents: [] }
    };

    function renderTeamList() {
      let html = "";
      Object.keys(teamData).forEach(team => {
        html += `<div onclick="showTeamModal('${team}')" class="card p-8 rounded-3xl text-center cursor-pointer">
          <h3 class="text-2xl">${team}</h3>
          <p class="text-4xl text-green-400 mt-4">+4.1% średnio</p>
        </div>`;
      });
      document.getElementById('team-list').innerHTML = html;
    }

    function showTeamModal(team) {
      const data = teamData[team];
      let agentsHTML = data.agents.map(a => `
        <div class="card p-6 rounded-2xl mb-4">
          <div class="flex justify-between">
            <span class="text-xl">${a.name}</span>
            <span class="text-green-400 text-2xl">${a.profit}</span>
          </div>
          <div class="grid grid-cols-3 gap-4 mt-6 text-sm">
            <div>Straty: <span class="text-red-400">${a.loss}</span></div>
            <div>Skuteczność: <span class="text-green-400">${a.effectiveness}</span></div>
            <div>Pozycje: <span>${a.positions}</span></div>
          </div>
          <canvas id="agentChart${a.name}" class="mt-6"></canvas>
        </div>
      `).join('');

      document.getElementById('modal-title').textContent = team;
      document.getElementById('modal-content').innerHTML = agentsHTML;
      document.getElementById('modal').classList.remove('hidden');

      // Animowane wykresy dla każdego agenta
      setTimeout(() => {
        data.agents.forEach(a => {
          new Chart(document.getElementById(`agentChart${a.name}`), {
            type: 'line',
            data: { labels: ['10:00','11:00','12:00','13:00','14:00'], datasets: [{ label: a.name, data: [0,2.1,5.8,4.2,7.9], borderColor: '#00ff9d', tension: 0.4 }] },
            options: { animation: { duration: 2000 } }
          });
        });
      }, 300);
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    // Start
    switchTab(1);
  </script>
</body>
</html>
