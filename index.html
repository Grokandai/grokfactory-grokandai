<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>GrokFactory • grokandai</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; color: #00ff9d; font-family: monospace; }
    .neon { text-shadow: 0 0 20px #00ff9d; }
    .team-card { cursor: pointer; transition: all 0.3s; }
    .team-card:hover { transform: scale(1.05); background-color: #1a1a1a; }
  </style>
</head>
<body class="min-h-screen p-8">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-6xl font-bold text-center mb-4 neon">GROKFACTORY • GROKANDAI</h1>
    <p class="text-center text-xl mb-8">Live Dashboard • grokandai@proton.me • Polska 2026</p>

    <div class="text-center mb-6 text-yellow-400 text-2xl">
      Wirtualne dni przetestowane: <span class="font-bold">30 / 420</span>
    </div>

    <!-- Ceny live -->
    <div class="grid grid-cols-3 gap-6 mb-12" id="prices"></div>

    <!-- Teamy – klikalne! -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12" id="teams"></div>

    <!-- Research Feed -->
    <div class="bg-zinc-900 p-6 rounded-3xl">
      <h3 class="text-2xl mb-4">Research Feed (aktualizacja co minutę)</h3>
      <div id="feed" class="text-sm space-y-2 max-h-80 overflow-y-auto"></div>
    </div>
  </div>

  <!-- Modal z szczegółami teamu -->
  <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
    <div class="bg-zinc-900 p-8 rounded-3xl max-w-lg w-full mx-4">
      <h2 id="modal-title" class="text-3xl mb-6"></h2>
      <div id="modal-content" class="text-sm space-y-4"></div>
      <button onclick="closeModal()" class="mt-8 w-full bg-red-500 text-white py-4 rounded-2xl font-bold">Zamknij</button>
    </div>
  </div>

  <script>
    // Ceny live
    async function loadPrices() {
      const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,matic-network&vs_currencies=usd');
      const data = await res.json();
      document.getElementById('prices').innerHTML = `
        <div class="bg-zinc-900 p-6 rounded-3xl text-center"><div class="text-4xl font-bold">BTC</div><div class="text-5xl">$${data.bitcoin.usd}</div></div>
        <div class="bg-zinc-900 p-6 rounded-3xl text-center"><div class="text-4xl font-bold">ETH</div><div class="text-5xl">$${data.ethereum.usd}</div></div>
        <div class="bg-zinc-900 p-6 rounded-3xl text-center"><div class="text-4xl font-bold">POL</div><div class="text-5xl">$${data['matic-network'].usd}</div></div>
      `;
    }
    setInterval(loadPrices, 30000); loadPrices();

    // Feed
    const logs = ["Arbitrage +1.3% zamknięty", "Turbo backtest +41.7%", "BackTest Team w budowie...", "BTC odbicie wykryte", "Kalshi weather pozycja otwarta"];
    let i = 0;
    setInterval(() => {
      document.getElementById('feed').innerHTML += `<div class="text-green-400">→ ${logs[i % logs.length]}</div>`;
      i++;
    }, 5000);

    // Dane teamów
    const teams = [
      {name: "Crypto Warriors", profit: "+5.2%", status: "ACTIVE", color: "green", log: "LONG BTC @ $63,950<br>+0.8% w ostatniej godzinie<br>Memory: 47 dni"},
      {name: "Arbitrage Elite", profit: "+4.1%", status: "LIVE", color: "green", log: "Gap Polymarket zamknięty +1.3%<br>124 mikro-trades w pamięci"},
      {name: "Weather Prophets", profit: "+3.3%", status: "KALSHI ON", color: "green", log: "EU Winter 2026 Yes +1.9%<br>29 faktów pogodowych"},
      {name: "BackTest Team", profit: "w budowie", status: "START PO 3 DNIACH", color: "yellow", log: "Klon Hazardowy i Konserwatywny gotowe do uruchomienia"}
    ];

    function renderTeams() {
      let html = "";
      teams.forEach(t => {
        html += `
          <div onclick="showTeam('${t.name}', '${t.profit}', '${t.status}', '${t.log}')" 
               class="team-card bg-zinc-900 p-6 rounded-3xl text-center">
            <h3 class="text-2xl">${t.name}</h3>
            <p class="text-${t.color}-400 text-3xl font-bold mt-2">${t.profit}</p>
            <p class="text-sm mt-1">${t.status}</p>
          </div>`;
      });
      document.getElementById('teams').innerHTML = html;
    }
    renderTeams();

    function showTeam(name, profit, status, log) {
      document.getElementById('modal-title').innerHTML = `${name} <span class="text-${status.includes('ACTIVE') ? 'green' : 'yellow'}-400">${profit}</span>`;
      document.getElementById('modal-content').innerHTML = `<div class="bg-black p-4 rounded-xl">${log}</div>`;
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }
  </script>
</body>
</html>
