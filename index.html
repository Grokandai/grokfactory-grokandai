<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>GrokFactory • grokandai</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; color: #00ff9d; font-family: monospace; }
    .neon { text-shadow: 0 0 20px #00ff9d; }
  </style>
</head>
<body class="min-h-screen p-8">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-6xl font-bold text-center mb-8 neon">GROKFACTORY • GROKANDAI</h1>
    <p class="text-center text-xl mb-8">Live Dashboard • grokandai@proton.me • Polska 2026</p>

    <div class="grid grid-cols-3 gap-6 mb-12" id="prices"></div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12">
      <div class="bg-zinc-900 p-6 rounded-3xl"><h3 class="text-2xl">Crypto Warriors</h3><p class="text-green-400">+5.2% • ACTIVE</p></div>
      <div class="bg-zinc-900 p-6 rounded-3xl"><h3 class="text-2xl">Arbitrage Elite</h3><p class="text-green-400">+4.1% • LIVE</p></div>
      <div class="bg-zinc-900 p-6 rounded-3xl"><h3 class="text-2xl">Weather Prophets</h3><p class="text-green-400">KALSHI ON</p></div>
      <div class="bg-zinc-900 p-6 rounded-3xl"><h3 class="text-2xl">BackTest Team</h3><p class="text-yellow-400">Start po 3 dniach</p></div>
    </div>

    <div class="bg-zinc-900 p-6 rounded-3xl">
      <h3 class="text-2xl mb-4">Research Feed (aktualizacja co minutę)</h3>
      <div id="feed" class="text-sm space-y-2 max-h-80 overflow-y-auto"></div>
    </div>

    <div class="flex gap-6 justify-center mt-8">
      <button onclick="motywuj()" class="bg-green-500 hover:bg-green-400 text-black px-10 py-5 rounded-2xl font-bold text-xl">MOTYWUJ TEAMY</button>
      <button onclick="arbitrage()" class="bg-yellow-500 hover:bg-yellow-400 text-black px-10 py-5 rounded-2xl font-bold text-xl">RUN ARBITRAGE</button>
    </div>
  </div>

  <script>
    async function loadPrices() {
      const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,matic-network&vs_currencies=usd');
      const data = await res.json();
      document.getElementById('prices').innerHTML = `
        <div class="bg-zinc-900 p-6 rounded-3xl text-center"><div class="text-4xl font-bold">BTC</div><div class="text-5xl">$${data.bitcoin.usd}</div></div>
        <div class="bg-zinc-900 p-6 rounded-3xl text-center"><div class="text-4xl font-bold">ETH</div><div class="text-5xl">$${data.ethereum.usd}</div></div>
        <div class="bg-zinc-900 p-6 rounded-3xl text-center"><div class="text-4xl font-bold">POL</div><div class="text-5xl">$${data['matic-network'].usd}</div></div>
      `;
    }
    setInterval(loadPrices, 30000); loadPrices();

    const logs = ["Turbo backtest +41.7%", "Arbitrage +1.3%", "BackTest Team w budowie...", "BTC live update", "Knowledge Cluster +89 reguł"];
    let i = 0;
    setInterval(() => {
      document.getElementById('feed').innerHTML += `<div class="text-green-400">→ ${logs[i % logs.length]}</div>`;
      i++;
    }, 6000);

    function motywuj() { alert('✅ Motywacja wysłana do wszystkich agentów!'); }
    function arbitrage() { alert('🚀 Arbitrage RUN! Szukam gapów...'); }
  </script>
</body>
</html>
