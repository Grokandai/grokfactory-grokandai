<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>GrokFactory • grokandai</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background: #0a0a0a; color: #00ff9d; font-family: monospace; }
    .neon { text-shadow: 0 0 20px #00ff9d; }
    .card { background: #111827; border: 1px solid #00ff9d33; transition: all 0.3s; }
    .card:hover { border-color: #00ff9d; transform: translateY(-4px); }
  </style>
</head>
<body class="min-h-screen flex">
  <!-- Sidebar -->
  <div class="w-64 bg-[#0f172a] p-6 fixed h-screen">
    <h1 class="text-3xl font-bold neon mb-10">GROKFACTORY</h1>
    <a href="#" onclick="showTeams()" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-[#1e2937]">📊 Teamy</a>
  </div>

  <div class="ml-64 flex-1 p-8" id="main">
    <h1 class="text-6xl font-bold neon mb-8">GROKFACTORY • GROKANDAI</h1>
    <p class="text-xl">Kliknij „Teamy” i porównuj wszystko</p>
  </div>

  <!-- Modal z wszystkimi agentami teamu -->
  <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center">
    <div class="bg-zinc-900 p-8 rounded-3xl max-w-6xl w-full max-h-[90vh] overflow-y-auto">
      <h2 id="modal-title" class="text-4xl neon mb-6"></h2>
      <div id="modal-agents" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
      <button onclick="closeModal()" class="mt-8 w-full bg-red-500 py-4 rounded-2xl font-bold">Zamknij</button>
    </div>
  </div>

  <script>
    function showTeams() {
      document.getElementById('main').innerHTML = `
        <h1 class="text-6xl font-bold neon mb-8">Teamy</h1>
        <div class="grid grid-cols-2 gap-6">
          <div onclick="openTeamModal('Crypto Warriors')" class="card p-8 rounded-3xl text-center cursor-pointer"><h3 class="text-2xl">Crypto Warriors</h3></div>
          <div onclick="openTeamModal('Arbitrage Elite')" class="card p-8 rounded-3xl text-center cursor-pointer"><h3 class="text-2xl">Arbitrage Elite</h3></div>
          <div onclick="openTeamModal('Weather Prophets')" class="card p-8 rounded-3xl text-center cursor-pointer"><h3 class="text-2xl">Weather Prophets</h3></div>
          <div onclick="openTeamModal('BackTest Team')" class="card p-8 rounded-3xl text-center cursor-pointer"><h3 class="text-2xl">BackTest Team</h3></div>
        </div>
      `;
    }

    const allTeams = {
      "Crypto Warriors": [
        {name:"Agent-1", profit:"+8.4%", loss:"-1.2%", eff:"87%", pos:"14", drawdown:"-4.2%", burned:"0"},
        {name:"Agent-2", profit:"+4.1%", loss:"-0.9%", eff:"79%", pos:"9", drawdown:"-2.8%", burned:"1"}
      ],
      "Arbitrage Elite": [
        {name:"Agent-1", profit:"+6.7%", loss:"0%", eff:"94%", pos:"47", drawdown:"-0.5%", burned:"0"}
      ],
      "Weather Prophets": [
        {name:"Agent-3", profit:"+3.9%", loss:"-2.1%", eff:"68%", pos:"11", drawdown:"-5.1%", burned:"0"}
      ],
      "BackTest Team": [
        {name:"Hazardowy Klon", profit:"+21.3%", loss:"-12.4%", eff:"61%", pos:"28", drawdown:"-18.7%", burned:"3"},
        {name:"Konserwatywny Klon", profit:"+4.8%", loss:"-0.3%", eff:"91%", pos:"12", drawdown:"-1.1%", burned:"0"}
      ]
    };

    function openTeamModal(team) {
      const agents = allTeams[team] || [];
      let html = `<h2 class="text-4xl neon mb-8">${team}</h2><div class="grid grid-cols-1 lg:grid-cols-2 gap-8">`;

      agents.forEach(agent => {
        html += `
          <div class="card p-6 rounded-3xl">
            <div class="flex justify-between mb-6">
              <span class="text-3xl">${agent.name}</span>
              <span class="text-5xl text-green-400">${agent.profit}</span>
            </div>
            <div class="grid grid-cols-2 gap-6 text-sm">
              <div>Straty: <span class="text-red-400">${agent.loss}</span></div>
              <div>Skuteczność: <span class="text-green-400">${agent.eff}%</span></div>
              <div>Pozycje: <span class="font-bold">${agent.pos}</span></div>
              <div>Max Drawdown: <span class="text-red-400">${agent.drawdown}%</span></div>
              <div class="col-span-2">Spalił konto: <span class="text-yellow-400">${agent.burned} razy</span></div>
            </div>
            <canvas id="chart-${agent.name}" class="mt-8 h-64"></canvas>
          </div>
        `;
      });

      html += `</div>`;
      document.getElementById('modal-agents').innerHTML = html;
      document.getElementById('modal-title').innerHTML = team;
      document.getElementById('modal').classList.remove('hidden');

      // Animowane wykresy dla WSZYSTKICH agentów
      setTimeout(() => {
        agents.forEach(agent => {
          new Chart(document.getElementById(`chart-${agent.name}`), {
            type: 'line',
            data: { labels: ['10:00','11:00','12:00','13:00','14:00'], datasets: [{ label: agent.name, data: [0, 3.2, 6.8, 4.9, 8.7], borderColor: '#00ff9d', tension: 0.4 }] },
            options: { animation: { duration: 2800 } }
          });
        });
      }, 400);
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    // Start
    showTeams();
  </script>
</body>
</html>
