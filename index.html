<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>GrokFactory • grokandai</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; color: #00ff9d; font-family: monospace; }
    .neon { text-shadow: 0 0 20px #00ff9d; }
    .sidebar a { transition: all 0.3s; }
    .sidebar a.active { background: #1e2937; border-left: 4px solid #00ff9d; color: white; }
  </style>
</head>
<body class="min-h-screen flex">
  <!-- Sidebar -->
  <div class="w-64 bg-[#0f172a] p-6 fixed h-screen">
    <h1 class="text-3xl font-bold neon mb-10">GROKFACTORY</h1>
    <nav class="space-y-2 text-lg">
      <a href="#" onclick="goTo(0)" class="active flex items-center gap-3 px-4 py-3 rounded-xl">🏠 Dashboard</a>
      <a href="#" onclick="goTo(1)" class="flex items-center gap-3 px-4 py-3 rounded-xl">📊 Teamy</a>
      <a href="#" onclick="goTo(2)" class="flex items-center gap-3 px-4 py-3 rounded-xl">📈 Wykresy</a>
      <a href="#" onclick="goTo(3)" class="flex items-center gap-3 px-4 py-3 rounded-xl">🔄 Arbitrage</a>
      <a href="#" onclick="goTo(4)" class="flex items-center gap-3 px-4 py-3 rounded-xl">📚 Knowledge Cluster</a>
      <a href="#" onclick="goTo(5)" class="flex items-center gap-3 px-4 py-3 rounded-xl">📋 BackTest Team</a>
    </nav>
  </div>

  <!-- Główna treść -->
  <div class="ml-64 flex-1 p-8" id="content">
    <h1 class="text-6xl font-bold neon">Dashboard</h1>
    <p class="mt-8 text-xl">Ceny live + turbo counter + wszystko co było wcześniej</p>
  </div>

  <script>
    function goTo(tab) {
      document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
      document.querySelectorAll('.sidebar a')[tab].classList.add('active');

      const content = document.getElementById('content');
      if (tab === 0) content.innerHTML = `<h1 class="text-6xl font-bold neon">Dashboard</h1><p class="mt-8 text-xl">Ceny live + turbo counter + wszystko co było wcześniej</p>`;
      if (tab === 1) content.innerHTML = `<h1 class="text-6xl font-bold neon">Teamy</h1><p class="mt-8 text-xl">Crypto Warriors, Arbitrage Elite, Weather Prophets, BackTest Team</p>`;
      if (tab === 2) content.innerHTML = `<h1 class="text-6xl font-bold neon">Wykresy</h1><p class="mt-8 text-xl">Tu będzie wykres BTC (w kolejnej wersji)</p>`;
      if (tab === 3) content.innerHTML = `<h1 class="text-6xl font-bold neon">Arbitrage</h1><p class="mt-8 text-xl">Kliknij RUN ARBITRAGE</p>`;
      if (tab === 4) content.innerHTML = `<h1 class="text-6xl font-bold neon">Knowledge Cluster</h1><p class="mt-8 text-xl">+89 reguł • 312 faktów</p>`;
      if (tab === 5) content.innerHTML = `<h1 class="text-6xl font-bold neon">BackTest Team</h1><p class="mt-8 text-xl text-yellow-400">Start 3 marca – klony gotowe</p>`;
    }
  </script>
</body>
</html>
