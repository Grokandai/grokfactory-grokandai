<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>GrokFactory • grokandai</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background: #0a0a0a; color: #00ff9d; font-family: monospace; }
    .neon { text-shadow: 0 0 20px #00ff9d; }
    .card { background: #111827; border: 1px solid #00ff9d33; }
    .sidebar { background: #0f172a; }
  </style>
</head>
<body class="min-h-screen flex">
  <!-- Sidebar -->
  <div class="sidebar w-64 p-6 fixed h-screen">
    <h1 class="text-3xl font-bold neon mb-10">GROKFACTORY</h1>
    <nav class="space-y-6 text-lg">
      <a href="#" class="flex items-center gap-3 text-green-400">🏠 Dashboard</a>
      <a href="#" class="flex items-center gap-3">📊 Teamy</a>
      <a href="#" class="flex items-center gap-3">📈 Wykresy</a>
      <a href="#" class="flex items-center gap-3">🔄 Arbitrage</a>
      <a href="#" class="flex items-center gap-3">📚 Knowledge Cluster</a>
      <a href="#" class="flex items-center gap-3">📋 BackTest Team</a>
    </nav>
  </div>

  <div class="ml-64 flex-1 p-8">
    <h1 class="text-5xl font-bold neon mb-8">GROKFACTORY • GROKANDAI</h1>

    <!-- Ceny live -->
    <div class="grid grid-cols-3 gap-6 mb-10" id="prices"></div>

    <!-- Główna siatka paneli -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Team cards -->
      <div id="teams" class="lg:col-span-2 grid grid-cols-2 gap-6"></div>

      <!-- Wykres -->
      <div class="card p-6 rounded-3xl">
        <h3 class="text-xl mb-4">BTC Live Chart</h3>
        <canvas id="btcChart" height="200"></canvas>
      </div>
    </div>

    <!-- Recent trades + Feed -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-8">
      <div class="card p-6 rounded-3xl">
        <h3 class="text-xl mb-4">Recent Trades (ostatnie 2h)</h3>
        <div id="trades" class="text-sm space-y-3"></div>
      </div>
      <div class="card p-6 rounded-3xl">
        <h3 class="text-xl mb-4">Research Feed</h3>
        <div id="feed" class="text-sm space-y-3 max-h-96 overflow-y-auto"></div>
      </div>
    </div>
  </div>

  <script>
    // Ceny
    async function loadPrices() {
      const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,matic-network&vs_currencies=usd');
      const d = await res.json();
      document.getElementById('prices').innerHTML = `
        <div class="card p-6 rounded-3xl text-center"><div class="text-3xl">BTC</div><div class="text-5xl font-bold">$${d.bitcoin.usd}</div></div>
        <div class="card p-6 rounded-3xl text-center"><div class="text-3xl">ETH</div><div class="text-5xl font-bold">$${d.ethereum.usd}</div></div>
        <div class="card p-6 rounded-3xl text-center"><div class="text-3xl">POL</div><div class="text-5xl font-bold">$${(d['matic-network']?.usd || 0.11).toFixed(4)}</div></div>
      `;
    }
    setInterval(loadPrices, 30000); loadPrices();

    // Teamy
    document.getElementById('teams').innerHTML = `
      <div class="card p-6 rounded-3xl text-center"><h3>Crypto Warriors</h3><p class="text-4xl text-green-400">+5.2%</p><p>ACTIVE</p></div>
      <div class="card p-6 rounded-3xl text-center"><h3>Arbitrage Elite</h3><p class="text-4xl text-green-400">+4.1%</p><p>LIVE</p></div>
      <div class="card p-6 rounded-3xl text-center"><h3>Weather Prophets</h3><p class="text-4xl text-green-400">+3.3%</p><p>KALSHI ON</p></div>
      <div class="card p-6 rounded-3xl text-center"><h3>BackTest Team</h3><p class="text-4xl text-yellow-400">w budowie</p></div>
    `;

    // Wykres BTC
    new Chart(document.getElementById('btcChart'), {
      type: 'line',
      data: { labels: ['10:00','11:00','12:00','13:00','14:00'], datasets: [{ label: 'BTC', data: [63500,63800,64000,63900,64100], borderColor: '#00ff9d', tension: 0.4 }] },
      options: { scales: { y: { grid: { color: '#ffffff11' } } } }
    });

    // Feed
    const logs = ["Arbitrage +1.3%", "Turbo +41.7%", "BTC odbicie wykryte", "Kalshi pozycja otwarta"];
    let i = 0;
    setInterval(() => {
      document.getElementById('feed').innerHTML += `<div class="bg-black p-3 rounded-xl">→ ${logs[i % logs.length]}</div>`;
      i++;
    }, 4000);

    // Recent trades (przykłady)
    document.getElementById('trades').innerHTML = `
      <div>LONG BTC @ $64,011 → +0.8%</div>
      <div>Arbitrage Polymarket +1.3%</div>
      <div>ETH Long +8% złapane</div>
    `;
  </script>
</body>
</html>
