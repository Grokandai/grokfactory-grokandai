<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrokFactory — AI Agent Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--g:#00ff9d;--g2:#00c97a;--g3:#00ff9d18;--g4:#00ff9d44;--bg:#04070f;--bg2:#080e1a;--card:#0a1120;--red:#ff3b6b;--yellow:#ffd93d;--blue:#00c8ff;--w:#e8f4f8}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--w);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}

.cursor{width:12px;height:12px;background:var(--g);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;box-shadow:0 0 12px var(--g);mix-blend-mode:screen}
.cursor-ring{width:36px;height:36px;border:1px solid var(--g4);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transition:transform .35s cubic-bezier(.23,1,.32,1)}

#cv{position:fixed;inset:0;z-index:0;opacity:.4;pointer-events:none}

#app{position:relative;z-index:1;display:flex;min-height:100vh}

#sidebar{width:268px;background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);border-right:1px solid var(--g3);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;transition:transform .35s cubic-bezier(.23,1,.32,1)}
.sb-logo{padding:1.6rem 1.4rem 1.1rem;border-bottom:1px solid var(--g3)}
.sb-logo svg{display:block;margin-bottom:.6rem}
.logo-t{font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;color:var(--g);letter-spacing:.12em;text-shadow:0 0 20px var(--g),0 0 40px var(--g2)}
.logo-s{font-size:.6rem;color:var(--g4);letter-spacing:.24em;margin-top:.12rem}
.sb-stats{display:flex;gap:.5rem;padding:.8rem 1.1rem;border-bottom:1px solid var(--g3)}
.sp{flex:1;background:var(--g3);border:1px solid var(--g4);border-radius:.45rem;padding:.4rem .3rem;text-align:center}
.sp .sv{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700}
.sp .sl{font-size:.52rem;letter-spacing:.09em;color:var(--g4);margin-top:.08rem}
.sb-nav{padding:.75rem .75rem;flex:1;overflow-y:auto}
.nl{font-size:.56rem;letter-spacing:.2em;color:var(--g4);padding:.45rem .45rem .2rem}
.ni{display:flex;align-items:center;gap:.7rem;padding:.6rem .8rem;border-radius:.6rem;border:1px solid transparent;cursor:pointer;transition:all .2s;margin-bottom:.18rem;font-size:.88rem;letter-spacing:.04em;color:#5a7a88}
.ni .ico{font-size:.95rem}
.ni .badge{margin-left:auto;font-size:.58rem;background:var(--g3);color:var(--g);padding:.08rem .38rem;border-radius:2rem;border:1px solid var(--g4);font-family:'Orbitron',monospace}
.ni:hover,.ni.active{background:var(--g3);border-color:var(--g4);color:var(--g)}
.sb-foot{padding:.8rem 1.2rem;border-top:1px solid var(--g3)}
.online{display:flex;align-items:center;gap:.4rem;font-size:.68rem;color:var(--g4)}
.pulse{width:7px;height:7px;background:var(--g);border-radius:50%;box-shadow:0 0 8px var(--g);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{50%{opacity:.3;box-shadow:none}}

#tb{display:none;position:fixed;top:0;left:0;right:0;height:54px;background:var(--bg2);border-bottom:1px solid var(--g3);z-index:100;align-items:center;padding:0 .9rem;gap:.8rem}
.mbtn{background:transparent;border:1px solid var(--g4);color:var(--g);width:36px;height:36px;border-radius:.45rem;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

#main{margin-left:268px;flex:1;padding:2rem 1.6rem;min-height:100vh}

.ph{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem}
.pt{font-family:'Orbitron',monospace;font-size:clamp(1.5rem,4vw,2.5rem);font-weight:900;color:var(--g);text-shadow:0 0 30px var(--g2);letter-spacing:.05em}
.ps{font-size:.78rem;color:var(--g4);letter-spacing:.16em;margin-top:.22rem}
.livebadge{display:flex;align-items:center;gap:.32rem;font-size:.65rem;letter-spacing:.13em;color:var(--g);background:var(--g3);border:1px solid var(--g4);border-radius:2rem;padding:.28rem .75rem;white-space:nowrap}

.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem;margin-bottom:2rem}
.sc{background:var(--card);border:1px solid var(--g3);border-radius:.8rem;padding:1rem;position:relative;overflow:hidden;transition:border-color .2s,transform .2s}
.sc:hover{border-color:var(--g4);transform:translateY(-2px)}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--g),transparent)}
.sc .scl{font-size:.58rem;letter-spacing:.15em;color:var(--g4);margin-bottom:.38rem}
.sc .scv{font-family:'Orbitron',monospace;font-size:1.38rem;font-weight:700;line-height:1}
.sc .scc{font-size:.7rem;margin-top:.28rem}
.sc-ico{position:absolute;bottom:.6rem;right:.8rem;opacity:.1;font-size:2rem}
.green{color:var(--g)}.red{color:var(--red)}.blue{color:var(--blue)}.yellow{color:var(--yellow)}

.stitle{font-family:'Orbitron',monospace;font-size:.68rem;letter-spacing:.24em;color:var(--g4);margin-bottom:1rem;display:flex;align-items:center;gap:.6rem}
.stitle::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--g4),transparent)}

.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.tc{background:var(--card);border:1px solid var(--g3);border-radius:1rem;padding:1.4rem 1.2rem;cursor:pointer;transition:all .3s cubic-bezier(.23,1,.32,1);position:relative;overflow:hidden;display:flex;flex-direction:column}
.tc::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 15% 15%,var(--tc,var(--g3)) 0%,transparent 60%);opacity:0;transition:opacity .3s}
.tc:hover{border-color:var(--g);transform:translateY(-7px) scale(1.01);box-shadow:0 20px 55px rgba(0,255,157,.08)}
.tc:hover::before{opacity:1}
.tgfx{width:100%;height:86px;margin-bottom:1rem;border-radius:.55rem;overflow:hidden;background:var(--bg2);border:1px solid var(--g3)}
.tgfx svg{width:100%;height:100%}
.tn{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700;color:var(--w);margin-bottom:.28rem;letter-spacing:.03em}
.td{font-size:.76rem;color:#4a6a78;margin-bottom:.8rem;flex:1}
.ts{display:flex;gap:.38rem}
.tsb{flex:1;background:var(--bg2);border:1px solid var(--g3);border-radius:.38rem;padding:.32rem .3rem;text-align:center}
.tsb .tv{font-family:'Orbitron',monospace;font-size:.72rem;font-weight:700}
.tsb .tl{font-size:.5rem;letter-spacing:.08em;color:var(--g4)}
.tarr{position:absolute;top:1rem;right:1rem;color:var(--g4);font-size:.9rem;transition:transform .2s,color .2s}
.tc:hover .tarr{transform:translate(3px,-3px);color:var(--g)}

#modal{display:none;position:fixed;inset:0;z-index:200;overflow-y:auto;padding:.85rem}
#modal.open{display:flex;align-items:flex-start;justify-content:center}
.mbk{position:fixed;inset:0;background:rgba(4,7,15,.94);backdrop-filter:blur(10px)}
.mbox{position:relative;z-index:1;background:var(--bg2);border:1px solid var(--g4);border-radius:1.25rem;width:100%;max-width:1060px;padding:1.6rem;box-shadow:0 0 80px rgba(0,255,157,.07);margin:auto}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;flex-wrap:wrap;gap:.8rem}
.mtitle{font-family:'Orbitron',monospace;font-size:clamp(1rem,3vw,1.55rem);font-weight:900;color:var(--g);text-shadow:0 0 20px var(--g2)}
.mcls{background:transparent;border:1px solid var(--red);color:var(--red);font-family:'Rajdhani',sans-serif;font-size:.8rem;letter-spacing:.1em;padding:.48rem 1.05rem;border-radius:.5rem;cursor:pointer;transition:all .2s}
.mcls:hover{background:var(--red);color:white;box-shadow:0 0 20px rgba(255,59,107,.35)}
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.85rem}
.ac{background:var(--card);border:1px solid var(--g3);border-radius:.85rem;padding:1rem;transition:all .22s;position:relative;overflow:hidden}
.ac:hover{border-color:var(--g);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,255,157,.06)}
.ach{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem}
.acn{font-family:'Orbitron',monospace;font-size:.78rem;font-weight:700;color:var(--w)}
.acb{font-size:.53rem;letter-spacing:.1em;background:rgba(0,255,157,.12);color:var(--g);border:1px solid var(--g4);padding:.1rem .42rem;border-radius:2rem}
.ap{font-family:'Orbitron',monospace;font-size:1.75rem;font-weight:900;line-height:1;margin-bottom:.65rem}
.amc{width:100%;height:42px;margin-bottom:.65rem}
.amc svg{width:100%;height:100%}
.ast{display:grid;grid-template-columns:repeat(3,1fr);gap:.32rem;margin-bottom:.8rem}
.asb{background:var(--bg);border:1px solid var(--g3);border-radius:.38rem;padding:.28rem .3rem;text-align:center}
.asb .av{font-family:'Orbitron',monospace;font-size:.63rem;font-weight:700}
.asb .al{font-size:.48rem;letter-spacing:.07em;color:var(--g4);margin-top:.06rem}
.dbtn{width:100%;background:transparent;border:1px solid var(--g);color:var(--g);font-family:'Rajdhani',sans-serif;font-size:.8rem;letter-spacing:.1em;padding:.58rem;border-radius:.5rem;cursor:pointer;transition:all .2s}
.dbtn:hover{background:var(--g);color:var(--bg);box-shadow:0 0 18px var(--g4);font-weight:700}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .42s ease both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}
.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--g4);border-radius:3px}

#ov{display:none;position:fixed;inset:0;z-index:49;background:rgba(4,7,15,.7)}
#ov.open{display:block}

@media(max-width:960px){
  #tb{display:flex}
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0;padding:1.1rem .8rem;padding-top:66px}
  .sg{grid-template-columns:repeat(2,1fr)}
  .tg{grid-template-columns:repeat(2,1fr)}
  .cursor,.cursor-ring{display:none}
}
@media(max-width:520px){
  .tg{grid-template-columns:1fr}
  .mbox{padding:1rem}
  .ag{grid-template-columns:1fr}
  .sg{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="cursor" id="cur"></div>
<div class="cursor-ring" id="crg"></div>
<canvas id="cv"></canvas>
<div id="ov" onclick="closeSb()"></div>

<div id="tb">
  <button class="mbtn" onclick="toggleSb()">☰</button>
  <span class="logo-t" style="font-size:.95rem">GROKFACTORY</span>
  <div style="margin-left:auto;display:flex;align-items:center;gap:.3rem;font-size:.65rem;color:var(--g)">
    <span class="pulse"></span>LIVE
  </div>
</div>

<div id="app">
<nav id="sidebar">
  <div class="sb-logo">
    <svg width="42" height="42" viewBox="0 0 42 42" fill="none">
      <polygon points="21,2 40,12 40,30 21,40 2,30 2,12" fill="none" stroke="#00ff9d" stroke-width="1.3" opacity=".5"/>
      <polygon points="21,8 34,16 34,26 21,34 8,26 8,16" fill="none" stroke="#00ff9d" stroke-width=".9" opacity=".25"/>
      <circle cx="21" cy="21" r="5" fill="#00ff9d" opacity=".9"/>
      <circle cx="21" cy="21" r="2.2" fill="#04070f"/>
      <line x1="21" y1="2" x2="21" y2="8" stroke="#00ff9d" stroke-width="1.3"/>
      <line x1="40" y1="12" x2="34" y2="16" stroke="#00ff9d" stroke-width="1.3"/>
      <line x1="40" y1="30" x2="34" y2="26" stroke="#00ff9d" stroke-width="1.3"/>
      <line x1="21" y1="40" x2="21" y2="34" stroke="#00ff9d" stroke-width="1.3"/>
      <line x1="2" y1="30" x2="8" y2="26" stroke="#00ff9d" stroke-width="1.3"/>
      <line x1="2" y1="12" x2="8" y2="16" stroke="#00ff9d" stroke-width="1.3"/>
    </svg>
    <div class="logo-t">GROKFACTORY</div>
    <div class="logo-s">AI AGENT PLATFORM v2.4</div>
  </div>
  <div class="sb-stats">
    <div class="sp"><div class="sv green">64</div><div class="sl">AGENCI</div></div>
    <div class="sp"><div class="sv yellow">+8.2%</div><div class="sl">ROI 24H</div></div>
    <div class="sp"><div class="sv blue" id="st-t">1.2K</div><div class="sl">TRADES</div></div>
  </div>
  <nav class="sb-nav">
    <div class="nl">GŁÓWNE</div>
    <div class="ni active" id="n-teams" onclick="showTeams();setA('n-teams')"><span class="ico">⬡</span>Teamy<span class="badge">6</span></div>
    <div class="ni" onclick="soon()"><span class="ico">◈</span>Dashboard</div>
    <div class="ni" onclick="soon()"><span class="ico">◎</span>Portfele</div>
    <div class="nl" style="margin-top:.5rem">NARZĘDZIA</div>
    <div class="ni" onclick="soon()"><span class="ico">⟳</span>Backtesting</div>
    <div class="ni" onclick="soon()"><span class="ico">⌖</span>API Keys</div>
  </nav>
  <div class="sb-foot">
    <div class="online"><span class="pulse"></span>Wszystkie systemy online</div>
    <div style="font-size:.56rem;color:#1a3a4a;margin-top:.3rem;letter-spacing:.09em">GROKANDAI © 2025</div>
  </div>
</nav>
<main id="main"></main>
</div>

<div id="modal">
  <div class="mbk" onclick="closeModal()"></div>
  <div class="mbox">
    <div class="mhdr">
      <div><div class="mtitle" id="mt"></div><div style="font-size:.64rem;letter-spacing:.15em;color:var(--g4);margin-top:.18rem" id="ms"></div></div>
      <button class="mcls" onclick="closeModal()">✕ ZAMKNIJ</button>
    </div>
    <div class="ag" id="ma"></div>
  </div>
</div>

<script>
const $c=document.getElementById('cur'),$r=document.getElementById('crg');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;$c.style.transform=`translate(${mx-6}px,${my-6}px)`});
(function l(){rx+=(mx-rx)*.14;ry+=(my-ry)*.14;$r.style.transform=`translate(${rx-18}px,${ry-18}px)`;requestAnimationFrame(l)})();

const cv=document.getElementById('cv'),ct=cv.getContext('2d');
let W,H;
function rsz(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
rsz();window.addEventListener('resize',rsz);
class Node{
  constructor(){this.reset()}
  reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*.26;this.vy=(Math.random()-.5)*.26;this.r=Math.random()*1.7+.4}
  u(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>W||this.y<0||this.y>H)this.reset()}
  d(){ct.beginPath();ct.arc(this.x,this.y,this.r,0,Math.PI*2);ct.fillStyle='#00ff9d';ct.fill()}
}
const nodes=Array.from({length:60},()=>new Node());
(function loop(){
  ct.clearRect(0,0,W,H);
  nodes.forEach(n=>n.u());
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.hypot(dx,dy);
      if(d<120){ct.beginPath();ct.moveTo(nodes[i].x,nodes[i].y);ct.lineTo(nodes[j].x,nodes[j].y);ct.strokeStyle=`rgba(0,255,157,${(1-d/120)*.15})`;ct.lineWidth=.5;ct.stroke()}
    }
    nodes[i].d();
  }
  requestAnimationFrame(loop);
})();

const TEAMS=[
  {id:'crypto',name:'Crypto Warriors',desc:'Handel BTC, ETH, SOL i altcoinami 24/7',roi:'+11.4%',agents:10,trades:'4.2K',wr:'71%',col:'#00ff9d',pts:[20,45,30,60,40,75,55,90,70,100,80,95]},
  {id:'arb',name:'Arbitrage Elite',desc:'Arbitraż między giełdami i DEX-ami w czasie rzeczywistym',roi:'+7.8%',agents:10,trades:'8.9K',wr:'84%',col:'#00c8ff',pts:[60,55,70,65,80,75,85,80,90,88,92,95]},
  {id:'wx',name:'Weather Prophets',desc:'Predykcje pogodowe dla rynków towarowych i energii',roi:'+5.2%',agents:10,trades:'1.1K',wr:'68%',col:'#ffd93d',pts:[30,35,28,40,38,50,45,55,50,60,58,65]},
  {id:'pol',name:'Politics Pulse',desc:'Analiza rynków predykcji politycznych i geopolityki',roi:'+9.1%',agents:10,trades:'2.3K',wr:'77%',col:'#ff3b6b',pts:[10,30,20,55,35,70,50,80,65,85,75,90]},
  {id:'spt',name:'Sports Bet Masters',desc:'AI typy sportowe — football, NBA, tenis, F1',roi:'+6.5%',agents:12,trades:'3.7K',wr:'73%',col:'#a78bfa',pts:[40,60,50,70,60,65,75,80,72,85,78,88]},
  {id:'meme',name:'Memecoin Hunters',desc:'Wykrywanie meme coinów przed pumpem — wejście wczesne',roi:'+18.7%',agents:8,trades:'5.5K',wr:'62%',col:'#ff9f43',pts:[5,10,8,20,15,50,30,90,60,120,80,150]},
];

function spark(pts,col,W=240,H=90,pad=5){
  const mx=Math.max(...pts),mn=Math.min(...pts),rng=mx-mn||1;
  const xs=pts.map((_,i)=>pad+(i/(pts.length-1))*(W-pad*2));
  const ys=pts.map(p=>H-pad-(((p-mn)/rng)*(H-pad*2)));
  const path='M '+xs.map((x,i)=>`${x},${ys[i]}`).join(' L ');
  const area=`M ${xs[0]},${H} L `+xs.map((x,i)=>`${x},${ys[i]}`).join(' L ')+` L ${xs[xs.length-1]},${H} Z`;
  const id='s'+Math.random().toString(36).slice(2,8);
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity=".3"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs><path d="${area}" fill="url(#${id})"/><path d="${path}" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${xs[xs.length-1]}" cy="${ys[ys.length-1]}" r="2.5" fill="${col}"/></svg>`;
}

function showTeams(){
  const sum=`<div class="sg fu">
    <div class="sc"><div class="scl">AGENCI AKTYWNI</div><div class="scv green">64</div><div class="scc green">↑ 4 nowe dziś</div><span class="sc-ico">⬡</span></div>
    <div class="sc"><div class="scl">ŁĄCZNY ROI 24H</div><div class="scv green">+8.2%</div><div class="scc green">↑ lepiej niż wczoraj</div><span class="sc-ico">◈</span></div>
    <div class="sc"><div class="scl">TRANSAKCJE DZIŚ</div><div class="scv blue">1 247</div><div class="scc" style="color:var(--g4)">⟳ aktualizacja co 30s</div><span class="sc-ico">⌁</span></div>
    <div class="sc"><div class="scl">BEST TEAM 24H</div><div class="scv yellow">+18.7%</div><div class="scc yellow">Memecoin Hunters</div><span class="sc-ico">★</span></div>
  </div>`;
  const cards=TEAMS.map((t,i)=>`
    <div class="tc fu d${i+1}" onclick="openTeam('${t.id}')">
      <span class="tarr">↗</span>
      <div class="tgfx">${spark(t.pts,t.col)}</div>
      <div class="tn">${t.name}</div>
      <div class="td">${t.desc}</div>
      <div class="ts">
        <div class="tsb"><div class="tv" style="color:${t.col}">${t.roi}</div><div class="tl">ROI</div></div>
        <div class="tsb"><div class="tv" style="color:var(--w)">${t.agents}</div><div class="tl">AGENTS</div></div>
        <div class="tsb"><div class="tv blue">${t.wr}</div><div class="tl">WIN%</div></div>
      </div>
    </div>`).join('');
  document.getElementById('main').innerHTML=`
    <div class="ph fu">
      <div><div class="pt">TEAMY</div><div class="ps">60+ AKTYWNYCH AGENTÓW AI W 6 TEAMACH</div></div>
      <div class="livebadge"><span class="pulse"></span>LIVE DATA</div>
    </div>
    ${sum}
    <div class="stitle">WSZYSTKIE TEAMY</div>
    <div class="tg">${cards}</div>`;
}

function openTeam(id){
  const t=TEAMS.find(x=>x.id===id);if(!t)return;
  const agents=Array.from({length:t.agents},(_,i)=>{
    const pts=Array.from({length:10},()=>Math.random()*100);
    return{name:`AGENT-${String(i+1).padStart(2,'0')}`,profit:`+${(3.5+i*.6+Math.random()*1.8).toFixed(1)}%`,trades:Math.floor(60+Math.random()*200),wr:`${Math.floor(58+Math.random()*28)}%`,pnl:`$${(Math.random()*7000+500).toFixed(0)}`,pts};
  });
  document.getElementById('mt').textContent=t.name;
  document.getElementById('ms').textContent=`${t.agents} AGENTÓW · ROI ${t.roi} · WIN RATE ${t.wr}`;
  document.getElementById('ma').innerHTML=agents.map((a,i)=>`
    <div class="ac fu d${Math.min(i%6+1,6)}">
      <div class="ach"><div class="acn">${a.name}</div><span class="acb">AKTYWNY</span></div>
      <div class="ap" style="color:${t.col};text-shadow:0 0 16px ${t.col}88">${a.profit}</div>
      <div class="amc">${spark(a.pts,t.col,200,42,3)}</div>
      <div class="ast">
        <div class="asb"><div class="av" style="color:${t.col}">${a.profit}</div><div class="al">ROI</div></div>
        <div class="asb"><div class="av blue">${a.wr}</div><div class="al">WIN%</div></div>
        <div class="asb"><div class="av yellow">${a.pnl}</div><div class="al">P&L</div></div>
      </div>
      <button class="dbtn" onclick="event.stopPropagation();alert('📊 Szczegóły ${a.name}\n\nTransakcje i wykresy — w przygotowaniu!')">SZCZEGÓŁY + TRANSAKCJE</button>
    </div>`).join('');
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){document.getElementById('modal').classList.remove('open');document.body.style.overflow='';}
function toggleSb(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('ov').classList.toggle('open')}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('ov').classList.remove('open')}
function setA(id){document.querySelectorAll('.ni').forEach(e=>e.classList.remove('active'));document.getElementById(id)?.classList.add('active')}
function soon(){
  document.getElementById('main').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center">
    <div style="font-size:3rem;margin-bottom:1.5rem;opacity:.4">⌖</div>
    <div style="font-family:'Orbitron',monospace;font-size:1.4rem;color:var(--g);margin-bottom:.6rem">WKRÓTCE</div>
    <div style="color:var(--g4);font-size:.82rem;letter-spacing:.14em">Ta sekcja jest w przygotowaniu</div>
    <button onclick="showTeams();setA('n-teams')" style="margin-top:1.75rem;background:transparent;border:1px solid var(--g4);color:var(--g);padding:.6rem 1.4rem;border-radius:.55rem;font-family:inherit;cursor:pointer;letter-spacing:.1em;font-size:.82rem">← WRÓĆ DO TEAMÓW</button>
  </div>`}

setInterval(()=>{const el=document.getElementById('st-t');if(el){const v=parseFloat(el.textContent)*1000;el.textContent=((v+Math.random()*4)/1000).toFixed(1)+'K'}},3000);

showTeams();
</script>
