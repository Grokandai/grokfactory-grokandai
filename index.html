<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrokFactory • grokandai</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    body {
      background: #0a0a0a;
      color: #00ff9d;
      font-family: 'Share Tech Mono', monospace;
    }
    .neon { text-shadow: 0 0 20px #00ff9d; }
    .agent-card {
      background: #111827;
      border: 1px solid #00ff9d33;
      transition: all 0.3s ease;
      height: 100%;
    }
    .agent-card:hover {
      border-color: #00ff9d;
      transform: translateY(-6px);
      box-shadow: 0 0 30px #00ff9d44;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div id="sidebar" class="w-64 bg-[#0f172a] p-6 fixed h-screen">
    <h1 class="text-3xl font-bold neon mb-10">GROKFACTORY</h1>
    <a href="#" onclick="showTeams()" class="block px-4 py-3 rounded-xl bg-[#1e2937] text-xl">📊 Teamy (60+ agentów)</a>
  </div>

  <div class="ml-64 flex-1 p-8">
    <h1 class="text-6xl font-bold neon mb-8">GROKFACTORY • GROKANDAI</h1>
    <button onclick="exportPDF()" class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-2xl font-bold">📄 Eksport raportu do PDF</button>
    <div id="main" class="mt-8"></div>
  </div>

  <!-- Modal teamu -->
  <div id="team-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center">
    <div class="bg-zinc-900 p-8 rounded-3xl max-w-7xl w-full max-h-[95vh] overflow-y-auto">
      <h2 id="team-title" class="text-4xl neon mb-8 text-center"></h2>
      <div id="team-agents" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      <button onclick="closeModal()" class="mt-12 w-full bg-red-500 py-4 rounded-2xl font-bold">Zamknij</button>
    </div>
  </div>

  <!-- Modal agenta -->
  <div id="agent-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center">
    <div class="bg-zinc-900 p-8 rounded-3xl max-w-6xl w-full max-h-[95vh] overflow-y-auto">
      <h2 id="agent-title" class="text-4xl neon mb-8"></h2>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <div class="card p-6 rounded-3xl" id="agent-stats"></div>
        <div class="card p-6 rounded-3xl">
          <h3 class="text-xl mb-4">Equity Curve</h3>
          <canvas id="equityChart" class="h-80"></canvas>
        </div>
      </div>
      <div class="card p-6 rounded-3xl mt-8">
        <h3 class="text-xl mb-4">Wszystkie transakcje</h3>
        <div id="transactions" class="space-y-3"></div>
      </div>
      <button onclick="closeAgentModal()" class="mt-10 w-full bg-red-500 py-4 rounded-2xl font-bold">Zamknij</button>
    </div>
  </div>

  <script>
    // Live update co minutę
    setInterval(() => {
      if (Math.random() > 0.7) alert("🔴 LIVE UPDATE: Zyski teamów właśnie wzrosły (+0.4% średnio)");
    }, 60000);

    function exportPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(22);
      doc.text("GROKFACTORY RAPORT", 20, 30);
      doc.setFontSize(12);
      doc.text("60+ agentów • " + new Date().toLocaleDateString('pl-PL'), 20, 50);
      doc.save("GrokFactory_Raport.pdf");
      alert("✅ Raport PDF zapisany!");
    }

    function showTeams() {
      document.getElementById('main').innerHTML = `
        <h1 class="text-6xl font-bold neon mb-12">Teamy – 60+ agentów</h1>
        <div class="grid grid-cols-2 gap-8">
          <div onclick="openTeam('Crypto Warriors')" class="agent-card p-8 rounded-3xl text-center cursor-pointer"><h3 class="text-3xl">Crypto Warriors</h3></div>
          <div onclick="openTeam('Arbitrage Elite')" class="agent-card p-8 rounded-3xl text-center cursor-pointer"><h3 class="text-3xl">Arbitrage Elite</h3></div>
          <div onclick="openTeam('Weather Prophets')" class="agent-card p-8 rounded-3xl text-center cursor-pointer"><h3 class="text-3xl">Weather Prophets</h3></div>
          <div onclick="openTeam('Politics Pulse')" class="agent-card p-8 rounded-3xl text-center cursor-pointer"><h3 class="text-3xl">Politics Pulse</h3></div>
          <div onclick="openTeam('Sports Bet Masters')" class="agent-card p-8 rounded-3xl text-center cursor-pointer"><h3 class="text-3xl">Sports Bet Masters</h3></div>
          <div onclick="openTeam('Memecoin Hunters')" class="agent-card p-8 rounded-3xl text-center cursor-pointer"><h3 class="text-3xl">Memecoin Hunters</h3></div>
        </div>
      `;
    }

    const allTeams = {
      "Crypto Warriors": Array.from({length:10}, (_,i) => ({name:`Agent-${i+1}`, profit:`+${(4.5 + i*0.7).toFixed(1)}%`})),
      "Arbitrage Elite": Array.from({length:10}, (_,i) => ({name:`Agent-${i+1}`, profit:`+${(5.2 + i*0.6).toFixed(1)}%`})),
      "Weather Prophets": Array.from({length:10}, (_,i) => ({name:`Agent-${i+1}`, profit:`+${(3.8 + i*0.5).toFixed(1)}%`})),
      "Politics Pulse": Array.from({length:10}, (_,i) => ({name:`Agent-${i+1}`, profit:`+${(4.1 + i*0.6).toFixed(1)}%`})),
      "Sports Bet Masters": Array.from({length:10}, (_,i) => ({name:`Agent-${i+1}`, profit:`+${(4.8 + i*0.7).toFixed(1)}%`})),
      "Memecoin Hunters": Array.from({length:10}, (_,i) => ({name:`Agent-${i+1}`, profit:`+${(6.1 + i*0.8).toFixed(1)}%`}))
    };

    function openTeam(team) {
      const agents = allTeams[team] || [];
      let html = `<h2 class="text-4xl neon mb-10 text-center">${team}</h2><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;

      agents.forEach(agent => {
        html += `
          <div class="agent-card p-8 rounded-3xl flex flex-col">
            <div class="flex-1">
              <h3 class="text-3xl">${agent.name}</h3>
              <p class="text-6xl text-green-400">${agent.profit}</p>
            </div>
            <button onclick="openAgentDetail('${team}', '${agent.name}')" class="mt-8 bg-green-600 hover:bg-green-500 py-5 rounded-2xl font-bold">
              SZCZEGÓŁY + TRANSAKCJE
            </button>
          </div>
        `;
      });

      html += `</div>`;
      document.getElementById('team-title').innerHTML = team;
      document.getElementById('team-agents').innerHTML = html;
      document.getElementById('team-modal').classList.remove('hidden');
    }

    function openAgentDetail(team, agentName) {
      document.getElementById('agent-title').innerHTML = `${team} • ${agentName}`;

      document.getElementById('agent-stats').innerHTML = `
        <div class="space-y-4 text-lg">
          <div>Zysk: <span class="text-green-400">+6.7%</span></div>
          <div>Straty: <span class="text-red-400">-0.5%</span></div>
          <div>Skuteczność: <span class="text-green-400">94%</span></div>
          <div>Pozycje: <span class="font-bold">47</span></div>
          <div>Max Drawdown: <span class="text-red-400">-0.5%</span></div>
          <div>Spalił konto: <span class="text-yellow-400">0 razy</span></div>
        </div>
      `;

      document.getElementById('transactions').innerHTML = `
        <div class="bg-black p-4 rounded-2xl flex justify-between"><span>10:15 BTC LONG</span><span class="text-green-400">+2.4%</span></div>
        <div class="bg-black p-4 rounded-2xl flex justify-between"><span>11:30 ETH SHORT</span><span class="text-red-400">-0.8%</span></div>
        <div class="bg-black p-4 rounded-2xl flex justify-between"><span>13:00 POL LONG</span><span class="text-green-400">+1.9%</span></div>
      `;

      document.getElementById('team-modal').classList.add('hidden');
      document.getElementById('agent-modal').classList.remove('hidden');

      setTimeout(() => {
        new Chart(document.getElementById('equityChart'), {
          type: 'line',
          data: { labels: ['10:00','11:00','12:00','13:00','14:00'], datasets: [{ label: agentName, data: [0,2.4,5.9,4.8,8.7], borderColor: '#00ff9d', borderWidth: 5 }] }
        });
      }, 300);
    }

    function closeModal() {
      document.getElementById('team-modal').classList.add('hidden');
      document.getElementById('agent-modal').classList.add('hidden');
    }

    showTeams();
  </script>
</body>
</html>
