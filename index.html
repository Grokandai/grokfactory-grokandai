<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>GrokFactory • grokandai</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background: #0a0a0a; color: #00ff9d; font-family: monospace; }
    .neon { text-shadow: 0 0 20px #00ff9d; }
    .card { background: #111827; border: 1px solid #00ff9d33; transition: all 0.3s; }
    .card:hover { border-color: #00ff9d; transform: translateY(-4px); }
    .sidebar a { transition: all 0.2s; }
    .sidebar a.active { color: #00ff9d; background: #1e2937; border-left: 4px solid #00ff9d; }
  </style>
</head>
<body class="min-h-screen flex">
  <!-- Sidebar – teraz działa! -->
  <div class="sidebar w-64 bg-[#0f172a] p-6 fixed h-screen">
    <h1 class="text-3xl font-bold neon mb-10">GROKFACTORY</h1>
    <nav class="space-y-2 text-lg">
      <a href="#" onclick="switchTab(0);return false" class="active flex items-center gap-3 px-4 py-3 rounded-xl">🏠 Dashboard</a>
      <a href="#" onclick="switchTab(1);return false" class="flex items-center gap-3 px-4 py-3 rounded-xl">📊 Teamy</a>
      <a href="#" onclick="switchTab(2);return false" class="flex items-center gap-3 px-4 py-3 rounded-xl">📈 Wykresy</a>
      <a href="#" onclick="switchTab(3);return false" class="flex items-center gap-3 px-4 py-3 rounded-xl">🔄 Arbitrage</a>
      <a href="#" onclick="switchTab(4);return false" class="flex items-center gap-3 px-4 py-3 rounded-xl">📚 Knowledge Cluster</a>
      <a href="#" onclick="switchTab(5);return false" class="flex items-center gap-3 px-4 py-3 rounded-xl">📋 BackTest Team</a>
    </nav>
  </div>

  <div class="ml-64 flex-1 p-8" id="main-content">
    <!-- Tutaj będzie się zmieniać treść po kliknięciu sidebaru -->
    <h1 class="text-6xl font-bold neon mb-8">GROKFACTORY • GROKANDAI</h1>
    <p class="text-center text-xl">Kliknij przycisk po lewej – treść się zmieni!</p>
  </div>

  <script>
    function switchTab(tab) {
      const content = document.getElementById('main-content');
      document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
      document.querySelectorAll('.sidebar a')[tab].classList.add('active');

      if (tab === 0) content.innerHTML = `<h1 class="text-5xl neon">Dashboard</h1><p class="mt-8">Ceny live + turbo counter + wszystko co było wcześniej</p>`;
      if (tab === 1) content.innerHTML = `<h1 class="text-5xl neon">Teamy</h1><p class="mt-8">Crypto Warriors + Arbitrage Elite + pełne szczegóły</p>`;
      if (tab === 2) content.innerHTML = `<h1 class="text-5xl neon">Wykresy</h1><canvas id="chart" class="mt-8"></canvas>`;
      if (tab === 3) content.innerHTML = `<h1 class="text-5xl neon">Arbitrage</h1><p class="mt-8">Aktualne gapy + przycisk RUN ARBITRAGE</p>`;
      if (tab === 4) content.innerHTML = `<h1 class="text-5xl neon">Knowledge Cluster</h1><p class="mt-8">+89 reguł • 312 faktów</p>`;
      if (tab === 5) content.innerHTML = `<h1 class="text-5xl neon">BackTest Team</h1><p class="mt-8">Klon Hazardowy gotowy – start 3 marca</p>`;
    }

    // Start na Dashboard
    switchTab(0);
  </script>
</body>
</html>
