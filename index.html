<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>GrokFactory • grokandai</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; color: #00ff9d; font-family: monospace; }
    .neon { text-shadow: 0 0 20px #00ff9d; }
    .card { transition: all 0.3s; }
    .card:hover { transform: translateY(-4px); }
  </style>
</head>
<body class="min-h-screen p-8 bg-zinc-950">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-5xl font-bold text-center mb-2 neon">GROKFACTORY • GROKANDAI</h1>
    <p class="text-center text-xl mb-8">Live Dashboard 2.0 • Polska 2026</p>

    <!-- Ceny + zysk -->
    <div class="grid grid-cols-3 gap-6 mb-10" id="prices"></div>

    <!-- Team status -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12" id="teams"></div>

    <!-- Research Feed + Knowledge Cluster -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <div class="bg-zinc-900 p-6 rounded-3xl">
        <h3 class="text-2xl mb-4">Research Feed (co minutę)</h3>
        <div id="feed" class="text-sm space-y-3 max-h-96 overflow-y-auto"></div>
      </div>
      <div class="bg-zinc-900 p-6 rounded-3xl">
        <h3 class="text-2xl mb-4">Knowledge Cluster</h3>
        <div class="bg-black p-5 rounded-2xl text-green-400">
          +89 reguł • 312 faktów<br>
          Ostatnia aktualizacja: przed chwilą
        </div>
        <button onclick="alert('Klaster zaktualizowany!')" class="mt-6 w-full bg-blue-600 py-4 rounded-2xl font-bold">UPDATE KNOWLEDGE CLUSTER</button>
      </div>
    </div>

    <div class="flex justify-center gap-6 mt-10">
      <button onclick="alert('✅ Motywacja wysłana do wszystkich agentów!')" class="bg-green-500 text-black px-12 py-5 rounded-2xl font-bold text-xl">MOTYWUJ TEAMY</button>
      <button onclick="alert('🚀 Arbitrage RUN! Szukam gapów...')" class="bg-yellow-500 text-black px-12 py-5 rounded-2xl font-bold text-xl">RUN ARBITRAGE</button>
    </div>
  </div>

  <script>
    // Ceny live
    async function loadPrices() {
      const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,matic-network&vs_currencies=usd');
      const d = await res.json();
      document.getElementById('prices').innerHTML = `
        <div class="bg-zinc-900 p-6 rounded-3xl text-center card"><div class="text-3xl">BTC</div><div class="text-5xl font-bold">$${d.bitcoin.usd}</div></div>
        <div class="bg-zinc-900 p-6 rounded-3xl text-center card"><div class="text-3xl">ETH</div><div class="text-5xl font-bold">$${d.ethereum.usd}</div></div>
        <div class="bg-zinc-900 p-6 rounded-3xl text-center card"><div class="text-3xl">POL</div><div class="text-5xl font-bold">$${d['matic-network'].usd}</div></div>
      `;
    }
    setInterval(loadPrices, 30000); loadPrices();

    // Feed
    const logs = ["Arbitrage #48 +1.3%", "Turbo backtest +41.7%", "BackTest Team gotowy do startu", "BTC odbicie wykryte", "Kalshi weather pozycja otwarta"];
    let i = 0;
    setInterval(() => {
      document.getElementById('feed').innerHTML += `<div class="bg-black p-3 rounded-xl">→ ${logs[i % logs.length]}</div>`;
      i++;
    }, 4000);

    // Teamy
    document.getElementById('teams').innerHTML = `
      <div class="bg-zinc-900 p-6 rounded-3xl text-center card"><h3>Crypto Warriors</h3><p class="text-green-400 text-4xl">+5.2%</p><p>ACTIVE</p></div>
      <div class="bg-zinc-900 p-6 rounded-3xl text-center card"><h3>Arbitrage Elite</h3><p class="text-green-400 text-4xl">+4.1%</p><p>LIVE</p></div>
      <div class="bg-zinc-900 p-6 rounded-3xl text-center card"><h3>Weather Prophets</h3><p class="text-green-400 text-4xl">+3.3%</p><p>KALSHI ON</p></div>
      <div class="bg-zinc-900 p-6 rounded-3xl text-center card"><h3>BackTest Team</h3><p class="text-yellow-400 text-4xl">w budowie</p><p>START 3 MARCA</p></div>
    `;
  </script>
</body>
</html>
